<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de cursos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #eef3f8; color: #333; }
    main { max-width: 1000px; margin: 0 auto; }
    h1 { margin-bottom: 1.5rem; font-size: 2rem; text-align: center; }
    ul { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; padding: 0; margin: 0; }
    li { list-style: none; }
    a { color: #1d4ed8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .course-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
      padding: 1.25rem;
      border-radius: 16px;
      background: white;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .course-card:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12); }
    .course-title { margin: 0 0 0.75rem 0; font-size: 1.25rem; }
    .course-meta { margin: 0.35rem 0; color: #64748b; }
    .course-description { margin: 0.8rem 0 1.2rem 0; line-height: 1.6; color: #475569; }
    .course-link { margin-top: auto; font-weight: 600; }
  
  </style>
</head>
<body>
  <main>
    <h1>Cursos disponibles</h1>
    <ul id="courses"></ul>
  </main>

  <script>
    async function loadCourses() {
      const response = await fetch('data/courses.json');
      const courses = await response.json();
      const list = document.getElementById('courses');

      courses.forEach(course => {
        const courseUrl = `pages/curso.html?id=${encodeURIComponent(course.id)}`;
        const item = document.createElement('li');
        item.className = 'course-card';

        item.innerHTML = `
          <div>
            <h2 class="course-title"><a href="${courseUrl}">${course.name}</a></h2>
            <p class="course-meta">Inicio: ${course.startDate}</p>
            <p class="course-description">${course.description}</p>
          </div>
          <a class="course-link" href="${courseUrl}">Ver proyectos del curso →</a>
        `;

        list.appendChild(item);
      });
    }

    loadCourses().catch(error => {
      document.getElementById('courses').innerHTML = '<li>No se pudieron cargar los cursos.</li>';
      console.error(error);
    });
  </script>
</body>
</html>
